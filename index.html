<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Papa's Tracker</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ea580c" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/192/ea580c/calendar.png" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/32/ea580c/calendar.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service worker registered.', reg))
            .catch(err => console.log('Service worker registration failed.', err));
        });
      }
    </script>
  </body>
</html>
